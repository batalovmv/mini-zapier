name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

  e2e:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: build
    if: >-
      github.event_name == 'push' &&
      vars.MINI_ZAPIER_E2E_BASE_URL != ''
    steps:
      - name: Check E2E password is set
        env:
          E2E_PASSWORD: ${{ secrets.MINI_ZAPIER_E2E_PASSWORD }}
        run: |
          if [ -z "$E2E_PASSWORD" ]; then
            echo "::notice::MINI_ZAPIER_E2E_PASSWORD secret is not set — skipping E2E."
            echo "SKIP_E2E=true" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v4
        if: env.SKIP_E2E != 'true'

      - uses: pnpm/action-setup@v4
        if: env.SKIP_E2E != 'true'

      - uses: actions/setup-node@v4
        if: env.SKIP_E2E != 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: env.SKIP_E2E != 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        if: env.SKIP_E2E != 'true'
        run: pnpm --filter @mini-zapier/web exec playwright install chromium

      - name: Wait for Vercel deployment
        if: env.SKIP_E2E != 'true'
        run: |
          echo "Waiting 120s for Vercel to deploy commit ${GITHUB_SHA::7}..."
          sleep 120

      - name: Run E2E smoke tests
        if: env.SKIP_E2E != 'true'
        working-directory: apps/web
        run: pnpm e2e
        env:
          MINI_ZAPIER_E2E_BASE_URL: ${{ vars.MINI_ZAPIER_E2E_BASE_URL }}
          MINI_ZAPIER_E2E_PASSWORD: ${{ secrets.MINI_ZAPIER_E2E_PASSWORD }}
          MINI_ZAPIER_E2E_USERNAME: ${{ vars.MINI_ZAPIER_E2E_USERNAME }}
          MINI_ZAPIER_E2E_ECHO_URL: ${{ vars.MINI_ZAPIER_E2E_ECHO_URL }}
